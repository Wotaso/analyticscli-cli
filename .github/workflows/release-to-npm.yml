name: Release to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PACKAGE_NAME: '@analyticscli/cli'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Resolve version/tag metadata
        id: meta
        run: |
          set -euo pipefail

          version="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"
          release_tag="v${version}"
          dist_tag="latest"
          if [[ "${version}" == *-* ]]; then
            dist_tag="preview"
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            pushed_tag="${GITHUB_REF#refs/tags/}"
            if [[ "${pushed_tag}" != "${release_tag}" ]]; then
              echo "::error::Tag/version mismatch. package.json has ${release_tag} but pushed tag is ${pushed_tag}."
              exit 1
            fi
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${dist_tag}" >> "$GITHUB_OUTPUT"

      - name: Run quality checks
        run: pnpm quality

      - name: Build package
        run: pnpm build

      - name: Check if version already exists on npm
        id: npm-check
        run: |
          set -euo pipefail
          if npm view "${PACKAGE_NAME}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.meta.outputs.version }} already published to npm; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ steps.npm-check.outputs.published == 'false' }}
        env:
          CLI_NPM_TOKEN: ${{ secrets.CLI_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          publish_tag="${{ steps.meta.outputs.dist_tag }}"
          publish_output="$(mktemp)"

          # Prefer npm trusted publishing via GitHub OIDC.
          unset NODE_AUTH_TOKEN || true
          set +e
          env -u NODE_AUTH_TOKEN npm publish --access public --tag "${publish_tag}" --provenance 2>&1 | tee "${publish_output}"
          publish_exit=$?
          set -e

          if [[ ${publish_exit} -eq 0 ]]; then
            exit 0
          fi

          if grep -Fq "You cannot publish over the previously published versions" "${publish_output}"; then
            echo "Version ${{ steps.meta.outputs.version }} became already published while workflow was running; continuing."
            exit 0
          fi

          publish_token="${NPM_TOKEN:-${CLI_NPM_TOKEN:-}}"
          if [[ -z "${publish_token}" ]]; then
            echo "npm trusted publishing failed and neither NPM_TOKEN nor CLI_NPM_TOKEN is configured." >&2
            echo "Configure npm trusted publishing for this repository/workflow or add one of those secrets." >&2
            exit "${publish_exit}"
          fi

          echo "Trusted publishing failed; retrying with token fallback."
          rm -f "${publish_output}"
          publish_output="$(mktemp)"
          set +e
          NODE_AUTH_TOKEN="${publish_token}" npm publish --access public --tag "${publish_tag}" 2>&1 | tee "${publish_output}"
          publish_exit=$?
          set -e

          if [[ ${publish_exit} -eq 0 ]]; then
            exit 0
          fi

          if grep -Fq "You cannot publish over the previously published versions" "${publish_output}"; then
            echo "Version ${{ steps.meta.outputs.version }} became already published while workflow was running; continuing."
            exit 0
          fi

          exit "${publish_exit}"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          generate_release_notes: true
          make_latest: ${{ steps.meta.outputs.dist_tag == 'latest' }}
          prerelease: ${{ steps.meta.outputs.dist_tag == 'preview' }}
